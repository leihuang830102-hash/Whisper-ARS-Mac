# 听写工具配置
mode: ptt                # ptt=按住说话 | toggle=按一下开始/再按一下结束
hotkey: control+f5      # 全局热键（修饰键+按键，+ 分隔）。避开 cmd+space(Spotlight)。fn 键 pynput 收不到，故用 ctrl+f5
model: models/whisper-large-v3-turbo          # 本地模型目录（mlx-whisper 检测到目录存在则跳过 HF 下载）。国内用 scripts/download_model.py 从 ModelScope 拉
language: zh             # 中文为主
sample_rate: 16000
silence_threshold: 0.01
record_dir: ""           # 留空不保存录音；调试可设 phase0/recordings/
